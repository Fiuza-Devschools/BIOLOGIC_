<!DOCTYPE html>
<html lang="pt-BR"></html>

<head>

<title>Biologic Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>


<body>

<header>
    <h1>🌱 Biologic</h1>
    <p>Sistema Inteligente de Sustentabilidade Integrada</p>
</header>

<main>  <section class="cards">
        <div class="card">
                <h3>🌡️ Temperatura</h3>
                <span id="temperatura">26°C</span>
            </div>

            <div class="card">
                <h3>💧 Umidade do Ar</h3>
                <span id="umidadeAr">68%</span>
            </div>

            <div class="card">
                <h3>🌱 Umidade do Solo</h3>
                <span id="umidadeSolo">35%</span>
            </div>

            <div class="card">
                <h3>☀️ Luminosidade</h3>
                <span id="luminosidade">Baixa</span>
            </div>

            <div class="card">
                <h3>🚰 Qualidade da Água</h3>
                <span id="agua">Adequada</span>
            </div>

            <div class="card">
                <h3>♻️ Composteira</h3>
                <span id="composteira">Adubo Pronto</span>
            </div>

        </section>

        <section class="alerta">

            <h2>📢 Recomendação</h2>
            <p id="mensagem">
                Adubo pronto. Deseja aplicar?
            </p>

            <div class="botoes">
            <button class="btn-verde">
                Fazer isso agora
            </button>

            <button class="btn-cinza">
                Depois
            </button>
            </div>

        </section></main>
</body>
